# ============================================================
# Application Config
# ============================================================
spring.application.name=RealEstateCRM

# Company Name — change this to your actual company name
app.company-name=B\u0110S CRM
app.company-tagline=H\u1ec7 th\u1ed1ng qu\u1ea3n l\u00fd b\u1ea5t \u0111\u1ed9ng s\u1ea3n n\u1ed9i b\u1ed9

# ============================================================
# H2 Database
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/realestate_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads

# ============================================================
# JWT
# ============================================================
app.jwt.secret=bds-crm-super-secret-key-change-in-production-2024-hanoi
app.jwt.expiration-ms=86400000

# ============================================================
# AI / Ollama Config
# ============================================================
# Set to "ollama" when Ollama + Qwen2 is installed, "mock" otherwise
app.ai.provider=mock
app.ai.ollama.base-url=http://localhost:11434
app.ai.ollama.model=qwen2
app.ai.ollama.timeout-seconds=60

# ============================================================
# CORS (allow React dev server)
# ============================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ============================================================
# Logging
# ============================================================
logging.level.com.realestate=INFO
logging.level.org.springframework.security=WARN
